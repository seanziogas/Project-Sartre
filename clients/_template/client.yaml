# Sartre instance manifest — validated against schemas/client-manifest.schema.json
# Copy this directory to clients/<Client Name>/ during Onboarding Week.

client:
  name: "[Client Name]"
  engagement_start: "YYYY-MM-DD"
  engagement_end: null
  pod:
    md: ""
    gtme: ""
    tos: ""

status: onboarding # onboarding | active | paused | archived

commercial:
  plan: engagement # engagement during delivery; platform for post-engagement subscription
  status: active # trialing | active | past_due | canceled
  licensed_modules: [] # empty = all manifest-enabled modules included
  portal_seats: 5
  renewal_date: null

stack:
  crm: null # salesforce | hubspot | attio
  enrichment: [clay]
  sequencers: []
  comms: [slack]
  meetings: [fathom]
  intent: []
  warehouse: []
  inbound: []

# Canonical module IDs — see docs/taxonomy.md. Enable requires green MVD (or explicit override).
modules:
  sales.outbound:
    enabled: false
    always_on: false
    thresholds: {}
  sales.abm:
    enabled: false
    always_on: false
    thresholds: {}
  sales.reactivation:
    enabled: false
    always_on: false
    thresholds: {}
  sales.takeout:
    enabled: false
    always_on: false
    thresholds: {}
  sales.copilot-briefs:
    enabled: false
    always_on: true
    schedule: "0 8 * * 1"
    thresholds: {}
  sales.rep-workflows:
    enabled: false
    always_on: false
    thresholds: {}
  marketing.inbound:
    enabled: false
    always_on: false
    thresholds: {}
  marketing.deanon:
    enabled: false
    always_on: false
    thresholds: {}
  marketing.events:
    enabled: false
    always_on: false
    thresholds: {}
  marketing.copy-factory:
    enabled: false
    always_on: false
    thresholds: {}
  marketing.ads-sync:
    enabled: false
    always_on: false
    thresholds: {}
  revops.enrichment:
    enabled: false
    always_on: true # hygiene runs on schedule once shipped
    schedule: "0 6 * * 1"
    thresholds: {}
  revops.dedup:
    enabled: false
    always_on: false
    thresholds: {}
  revops.lead-convert:
    enabled: false
    always_on: false
    thresholds: {}
  revops.routing:
    enabled: false
    always_on: false
    thresholds: {}
  revops.tam:
    enabled: false
    always_on: false
    thresholds: {}
  revops.etl:
    enabled: false
    always_on: false
    thresholds: {}
  revops.remediation:
    enabled: false
    always_on: true
    thresholds: {}
  platform.signals:
    enabled: false
    always_on: true
    schedule: "0 * * * *"
    thresholds: {}
  platform.quality:
    enabled: true
    always_on: true
    schedule: "0 7 * * 1" # after the weekly canonical enrichment refresh
    thresholds: {}
  platform.metrics:
    enabled: true # baseline→delta reporting on from day one
    always_on: true
    schedule: "0 9 * * 1"
    thresholds: {}
  platform.digests:
    enabled: false
    always_on: true
    schedule: "0 10 * * 1"
    thresholds: {}
  platform.learning:
    enabled: true # feedback-event capture is always on; tuning speeds opt in below
    always_on: true
    schedule: "0 8 * * 1"
    thresholds: {}

policies:
  approval:
    outbound_send: block # every outward-facing output stops in a review queue
    crm_write: block
    client_comms: block
    brain_change: block # includes Layer-8 proposed diffs
    internal_report: block
  learning:
    capture: true
    exemplar_memory: true
    weekly_tuning: true # proposals still require eval pass + brain_change approval
    outcome_optimization: true # evaluated proposals only; brain_change gate still blocks application
  data:
    flag_dont_delete: true
    snapshot_before_write: true
    reenrichment_window_days: 90
    namespaced_field_prefix: "Kiln_"

delivery:
  channels:
    - type: slack
      target: "" # client channel id
      outputs: [digests, reports]

budgets:
  clay_credits_monthly: null
  token_budget_monthly_usd: null
  per_run_defaults:
    max_clay_credits: null
    max_tokens_usd: null

# Written by the Day-1 Data Audit; refreshed by platform.quality. Do not hand-edit.
mvd: {}
